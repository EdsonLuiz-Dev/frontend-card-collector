<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register &mdash; CardCollector</title>
  <link rel="stylesheet" href="/src/main/css/reset.css" />
  <link rel="stylesheet" href="/src/main/css/variables.css" />
  <link rel="stylesheet" href="/src/main/css/typography.css" />
  <link rel="stylesheet" href="/src/main/css/partials/templates/header.css" />
  <link rel="stylesheet" href="/src/main/css/partials/templates/footer.css" />
  <link rel="stylesheet" href="/src/main/css/pages/register.css" />
</head>
<body class="page-auth">

  <div id="site-header"></div>

  <main class="auth-container">
    <div class="auth-box">
      <h1 class="auth-title">CardCollector</h1>
      <h2 class="auth-subtitle">Create Account</h2>

      <form class="auth-form" id="form-register" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Your name"
            required
            autocomplete="name"
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="your@email.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Choose a password"
            required
            autocomplete="new-password"
          />
        </div>

        <div class="form-error" id="register-error" role="alert" hidden></div>

        <button class="btn btn-primary btn-full" type="submit">Create Account</button>
      </form>

      <p class="auth-redirect">
        Already have an account? <a href="/src/main/pages/login.html">Sign In</a>
      </p>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="/src/assets/js/components.js"></script>
  <script src="/src/assets/js/register.js"></script>
</body>
</html>
