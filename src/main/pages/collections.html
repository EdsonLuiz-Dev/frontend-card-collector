<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Collections &mdash; CardCollector</title>
  <link rel="stylesheet" href="/src/main/css/reset.css" />
  <link rel="stylesheet" href="/src/main/css/variables.css" />
  <link rel="stylesheet" href="/src/main/css/typography.css" />
  <link rel="stylesheet" href="/src/main/css/partials/templates/header.css" />
  <link rel="stylesheet" href="/src/main/css/partials/templates/footer.css" />
  <link rel="stylesheet" href="/src/main/css/pages/collections.css" />
</head>
<body class="page-collections">

  <div id="site-header"></div>

  <main class="page-content container">

      <section class="section-create-collection">
        <h2>New Collection</h2>
        <form class="form-inline" id="form-create-collection" novalidate>
          <div class="form-group">
            <label for="collection-name" class="sr-only">Collection name</label>
            <input
              type="text"
              id="collection-name"
              name="nameCollection"
              placeholder="Collection name"
              required
            />
          </div>
          <button class="btn btn-primary" type="submit">Create</button>
        </form>
        <div class="form-error" id="create-error" role="alert" hidden></div>
      </section>

      <section class="section-collections">
        <h2>My Collections</h2>

        <div class="collections-empty" id="collections-empty" hidden>
          <p>You have no collections yet. Create one above!</p>
        </div>

        <ul class="collection-list" id="collection-list"></ul>
      </section>

  </main>

  <div id="site-footer"></div>

  <script src="/src/assets/js/components.js"></script>
  <script src="/src/assets/js/collections.js"></script>
</body>
</html>
