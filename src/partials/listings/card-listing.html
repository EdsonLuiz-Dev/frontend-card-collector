<li class="card-item">
  <div class="card-image">
    <img src="" alt="" />
  </div>
  <div class="card-info">
    <h3 class="card-name"></h3>
    <p class="card-set">Set: <span class="card-set-name"></span> (<span class="card-set-code"></span>)</p>
    <p class="card-qty">Qty: <span class="card-qty-value"></span></p>

    <button class="btn btn-danger btn-remove-card" type="button">Remove</button>
  </div>
</li>
